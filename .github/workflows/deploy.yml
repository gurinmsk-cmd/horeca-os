name: Deploy Hugo to Yandex Cloud
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true
      - name: Build
        run: hugo --minify
      - name: Deploy to Yandex Object Storage
        uses: jakejarvis/s3-sync-action@v0.5.1
        with:
          args: --delete
        env:
          AWS_S3_ENDPOINT: https://storage.yandexcloud.net
          AWS_ACCESS_KEY_ID: ${{ secrets.YANDEX_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YANDEX_SECRET_KEY }}
          AWS_S3_BUCKET: ${{ secrets.YANDEX_BUCKET }}
          SOURCE_DIR: 'public'
